<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Manuel VCF Oluşturucu</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      padding: 15px;
      font-size: 14px;
      background: #f4f7fa;
      color: #333;
      width: 400px;
      height: 250px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    header img {
      height: 32px;
    }

    header h2 {
      font-size: 18px;
      margin: 0;
      color: #004080;
    }

    input[type="text"] {
      padding: 6px;
      font-size: 14px;
      width: 100%;
      max-width: 250px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 5px 10px;
      margin-top: 10px;
      margin-right: 6px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #addRow { background-color: #17a2b8; color: white; }
    #clearTable { background-color: #ffc107; color: black; }
    #sendBtn { background-color: #28a745; color: white; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 15px;
      background-color: white;
    }

    th {
      background-color: #004080;
      color: white;
      font-weight: normal;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 4px;
      min-width: 80px;
      font-size: 12px;
      text-align: left;
    }

    td {
      background-color: #fdfdfd;
    }

    td:focus {
      outline: 2px solid #007bff;
      background-color: #e6f0ff;
    }

    #result {
      margin-top: 10px;
      color: green;
      font-weight: bold;
    }
  </style>
  <style>
    body.light { background: #f4f7fa; color: #333; }
    body.dark { background: #1e1e1e; color: #ddd; }

    body.dark th { background-color: #333; color: #eee; }
    body.dark td { background-color: #2b2b2b; color: #ddd; }
    body.dark input, body.dark button {
      background-color: #444;
      color: white;
      border: 1px solid #555;
    }

    button { cursor: pointer; }


  </style>
</head>
<body>

<header style="display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px;">
  <!-- Sol taraf: Logo ve Başlık -->
  <div style="display: flex; align-items: center; gap: 10px;">
    <img src="icon.ico" alt="Logo" style="height: 40px;">
    <h2 class="i18n" data-msg="app_title" style="margin: 0;">VCF Oluştur</h2>
  </div>

  <!-- Sağ taraf: Butonlar -->

  <div>
    <button id="langSwitch" class="i18n" data-msg="langSwitch" title="Switch Language">🌐 TR</button>
    <button id="themeToggle" title="Toggle Theme">🌙</button>
    <a href="https://contacts.google.com/" target="_blank" rel="noopener">
      <button id="googleContactsBtn" title="Google Kişiler">
        <img src="contacts.png" alt="Google Kişiler" style="height: 18px;">
      </button>
    </a>
    <br>
    <button id="contactBtn" class="i18n" data-msg="contactBtn" title="İletişim">📩 İletişim</button>
    <span id="contactInfo" style="display: none; font-size: 12px; color: #666; margin-left: 1px;">h.ocak0101@gmail.com</span>
  </div>
</header>

  <p class="i18n" data-msg="note_text" style="margin-top: -10px; font-size: 10px; color: #666;">
  Sadece "Görünen Ad" ve "Mobil" bilgilerinin doldurulması yeterlidir.
  </p>
  <input type="text" id="fileName" class="i18n" data-msg="fileName" placeholder="Dosya adı" required><br><br>
  <button id="addRow" class="i18n" data-msg="add_row">Satır Ekle</button>
  <button id="clearTable" class="i18n" data-msg="clear_table">Tümünü Temizle</button>
  <button id="sendBtn" class="i18n" data-msg="generate">VCF Oluştur</button>
  <button id="expandBtn" class="i18n" data-msg="expand">Genişlet</button>
  <button id="shrinkBtn" class="i18n" data-msg="shrink">Daralt</button>


  <p id="result"></p>
  <div style="overflow-x: auto;">
    <table id="dataTable">
      <thead>
        <tr>
          <th class="i18n" data-msg="col_name">Adı</th>
          <th class="i18n" data-msg="col_surname">Soyadı</th>
          <th class="i18n" data-msg="col_display">Görünen Ad</th>
          <th class="i18n" data-msg="col_mobile">Mobil</th>
          <th class="i18n" data-msg="col_work">İş Tel</th>
          <th class="i18n" data-msg="col_home">Ev Tel</th>
          <th class="i18n" data-msg="col_fax">Fax</th>
          <th class="i18n" data-msg="col_email">Mail</th>
          <th class="i18n" data-msg="col_address">Adres</th>
          <th class="i18n" data-msg="col_company">Firma</th>
          <th class="i18n" data-msg="col_title">Unvan</th>
          <th class="i18n" data-msg="col_website">Website</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <script src="popup.js"></script>
</body>
</html>
